<!DOCTYPE html><html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Adopción de Perros y Gatos</title>
  <style>

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #f5f5f5;

    }
  /* Estilos básicos para la barra de menú */
.navbar {
    background-color: #f763be; /* Color de fondo */
    padding: 10px 0;
}

.navbar ul {
    list-style-type: none; /* Quita los puntos de la lista */
    margin: 0;
    padding: 0;
    text-align: center; /* Centra el menú */
}

.navbar ul li {
    display: inline; /* Pone los elementos en horizontal */
    margin: 0 15px; /* Espaciado entre elementos */
}

.navbar ul li a {
    text-decoration: none; /* Quita el subrayado */
    color: white; /* Color del texto */
    font-family: Arial, sans-serif;
    font-weight: bold;
}

/* Efecto al pasar el mouse */
.navbar ul li a:hover {
    color: #00fc86;
}
    header {
     background-color: #ff97cb;
      color: white;
      text-align: center;
      padding: 20px;
    }
    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
      overflow: hidden;
      text-align: center;
    }
    .card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }
    .card h3 {
      margin: 10px 0;
    }
    .card p {
      padding: 0 10px;
      color: #555;
    }
    .btn {
      display: inline-block;
      margin: 10px;
      padding: 10px 15px;
      background-color: #5c9c09;
      color: white;
      border-radius: 5px;
      text-decoration: none;
    }
    .btn:hover {
         background-color: #67bb5c;
    }
    footer {
      text-align: center;
      padding: 15px;
      background-color: #333;
      color: white;
    }
 
  </style>
</head>
